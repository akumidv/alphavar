name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Sync dependencies (with etl extra + dev/test groups)
        run: uv sync --extra etl

      - name: Lint (ruff)
        run: uv run ruff check src tests tools

      - name: Tests (pytest, hermetic fixtures)
        run: uv run pytest
