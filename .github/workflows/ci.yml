name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keystone generated pointers
        run: python3 _forge/keystone/bin/sync.py --check

      - name: Keystone verify
        run: python3 _forge/keystone/bin/verify.py --strict

      - name: Keystone self fixture verify
        run: python3 _forge/keystone/bin/self_ci.py

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Sync dependencies (with etl extra + dev/test groups)
        run: uv sync --extra etl

      - name: Lint (ruff)
        run: uv run ruff check src tests tools

      - name: Tests (pytest, hermetic fixtures)
        run: uv run pytest

      - name: Keystone hook tests
        run: uv run pytest _forge/keystone/tests
